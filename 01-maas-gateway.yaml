# Gateway 1 — the MaaS gateway (created by the MaaS platform install; included
# here for reference). MaaS auto-manages this gateway: it attaches the
# gateway-level AuthPolicy, exposes the maas-api (key minting + /v1/models), and
# generates the per-model HTTPRoutes/auth/quota on it.
#
# Must be named maas-default-gateway in openshift-ingress. Edit the hostname for
# your cluster's apps domain.
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: maas-default-gateway
  namespace: openshift-ingress
  annotations:
    opendatahub.io/managed: "false"
    security.opendatahub.io/authorino-tls-bootstrap: "true"
spec:
  gatewayClassName: maas-gateway-class
  listeners:
    - name: https
      protocol: HTTPS
      port: 443
      hostname: "maas.apps.cluster-nmv4m.nmv4m.sandbox1140.opentlc.com"
      allowedRoutes:
        namespaces:
          from: All
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            group: ""
            name: cert-manager-ingress-cert
