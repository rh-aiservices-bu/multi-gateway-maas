# Publishes both models to MaaS and grants a subscription + authorization policy.
# - MaaSModelRef       : registers each LLMInferenceService in the MaaS catalog
#                        (what the dashboard's "Publish as MaaS endpoint" creates)
# - MaaSSubscription   : per-model token budgets (qwen-3 1000/h, bge-embed 5000/h)
# - MaaSAuthPolicy     : which groups may call the models at the gateway
# system:cluster-admins is included so kube:admin can mint keys; use real
# OpenShift/OIDC groups for per-user governance.
---
apiVersion: maas.opendatahub.io/v1alpha1
kind: MaaSModelRef
metadata:
  name: qwen-3
  namespace: demo-llm
spec:
  modelRef:
    kind: LLMInferenceService
    name: qwen-3
---
apiVersion: maas.opendatahub.io/v1alpha1
kind: MaaSModelRef
metadata:
  name: bge-embed
  namespace: demo-llm
spec:
  modelRef:
    kind: LLMInferenceService
    name: bge-embed
---
apiVersion: maas.opendatahub.io/v1alpha1
kind: MaaSSubscription
metadata:
  name: test-sub
  namespace: models-as-a-service
spec:
  priority: 0
  owner:
    groups:
      - name: my-model-registry-users
      - name: rhods-admins
      - name: system:cluster-admins
  modelRefs:
    - name: qwen-3
      namespace: demo-llm
      tokenRateLimits:
        - limit: 1000
          window: 1h
    - name: bge-embed
      namespace: demo-llm
      tokenRateLimits:
        - limit: 5000
          window: 1h
---
apiVersion: maas.opendatahub.io/v1alpha1
kind: MaaSAuthPolicy
metadata:
  name: test-sub-policy
  namespace: models-as-a-service
spec:
  subjects:
    groups:
      - name: my-model-registry-users
      - name: system:cluster-admins
  modelRefs:
    - name: qwen-3
      namespace: demo-llm
    - name: bge-embed
      namespace: demo-llm
