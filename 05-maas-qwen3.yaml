# MaaS-published generative model (Qwen3-0.6B). Copied from the rhoai3.4-maas
# repo's qwen-3-llminferenceservice.yaml but replicas: 1 (repo default is 2).
#
# router.gateway.refs binds this LLMInferenceService to maas-default-gateway via
# plain YAML. (Binding to the MaaS gateway via the dashboard dropdown is not
# supported, but the YAML path works and is how MaaS subscription/quota
# enforcement is wired.)
apiVersion: serving.kserve.io/v1alpha1
kind: LLMInferenceService
metadata:
  name: qwen-3
  namespace: demo-llm
spec:
  model:
    name: qwen-3
    uri: hf://Qwen/Qwen3-0.6B
  replicas: 1
  router:
    gateway:
      refs:
        - name: maas-default-gateway
          namespace: openshift-ingress
    route: {}
    scheduler: {}
  template:
    containers:
      - name: main
        resources:
          limits:
            cpu: "1"
            memory: 12Gi
            nvidia.com/gpu: "1"
          requests:
            cpu: "1"
            memory: 12Gi
            nvidia.com/gpu: "1"
    tolerations:
      - key: nvidia.com/gpu
        operator: Exists
        effect: NoSchedule
