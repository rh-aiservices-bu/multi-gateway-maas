# Test B2 — second LLMInferenceService bound to the SECOND gateway.
# Key line: spec.router.gateway.refs -> secure-inference (openshift-ingress).
# This is the documented mechanism for binding a model to a specific,
# separate Gateway (one per trust zone). We test:
#   1. Does the binding work via plain YAML (no dashboard "gateway discovery"
#      Tech Preview flag)?
#   2. Does status.addresses report the SECURE gateway's ELB (not the shared one)?
#   3. Does the HTTPRoute attach to secure-inference only (isolation)?
#
# Same Qwen3-4B model as qwen-tools, replicas: 1 (needs 1 free L40S GPU).
apiVersion: serving.kserve.io/v1alpha1
kind: LLMInferenceService
metadata:
  name: secure-model
  namespace: secure-models
  annotations:
    opendatahub.io/hardware-profile-name: gpu-profile
    opendatahub.io/hardware-profile-namespace: redhat-ods-applications
    opendatahub.io/model-type: generative
    openshift.io/display-name: secure-model
    security.opendatahub.io/enable-auth: "false"
spec:
  model:
    name: Qwen/Qwen3-4B
    uri: hf://Qwen/Qwen3-4B
  replicas: 1
  router:
    route: {}
    scheduler: {}
    gateway:
      refs:
      - name: secure-inference
        namespace: openshift-ingress
  template:
    containers:
    - name: main
      resources:
        limits:
          cpu: "2"
          memory: 16Gi
          nvidia.com/gpu: "1"
        requests:
          cpu: "2"
          memory: 16Gi
          nvidia.com/gpu: "1"
    tolerations:
    - effect: NoSchedule
      key: nvidia.com/gpu
      operator: Exists
