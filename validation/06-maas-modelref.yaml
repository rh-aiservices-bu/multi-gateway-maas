# Publishes the qwen-3 LLMInferenceService into the MaaS catalog.
# This is the object the dashboard's "Publish as MaaS endpoint" creates; the
# MaaSSubscription.modelRefs[].name references THIS object (not the LLMISVC
# directly). Without it the subscription reports "model references are invalid
# or unavailable" and the MaaS /v1/models catalog is empty.
apiVersion: maas.opendatahub.io/v1alpha1
kind: MaaSModelRef
metadata:
  name: qwen-3
  namespace: demo-llm
spec:
  modelRef:
    kind: LLMInferenceService
    name: qwen-3
